name: Build firmware and push Tiny Screen image

# Two things happen here, on GitHub's own runners:
#   1. Compile the ESP32-S3 firmware with PlatformIO -- TWO variants, since
#      board 1 needs the opposite ARDUINO_USB_CDC_ON_BOOT setting from
#      board 0 (a compile-time flag, not something runtime config can
#      change -- see firmware/platformio.ini) -- and drop both sets of
#      binaries into webflasher/firmware/{bridge,native}/. Used by BOTH the
#      browser WebSerial flasher (index.html) and the server-side flasher
#      baked into the Docker image (server.py's /api/flash, for boards
#      plugged directly into the ZimaBlade instead of a computer).
#   2. Build app/Dockerfile (which bundles those binaries) and push it to
#      Docker Hub.
# Nothing needs to be installed on your own machine -- just push to main.

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}  # lets you trigger a build manually from the Actions tab

jobs:
  # Host-side checks: everything testable without hardware, now actually
  # gating the image push (build-and-push needs this job). The playwright
  # visual test is deliberately NOT run here (needs a browser install and
  # checks pixels, not logic) -- it stays a local/manual tool.
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # The Arduino IDE sketch tree must stay byte-identical to
      # firmware/src (same code, two packagings -- see README). Nothing
      # enforced that until now except discipline; this fails the build
      # on any drift, so an edit to one copy can't ship without the
      # other.
      - name: Guard against firmware copy drift
        run: |
          diff -u firmware/src/main.cpp firmware_arduino/zima_tinyscreen/zima_tinyscreen.ino \
            || { echo "::error::firmware/src/main.cpp and the Arduino sketch have drifted -- re-sync them."; exit 1; }
          diff -u firmware/src/tiny_fonts.h firmware_arduino/zima_tinyscreen/tiny_fonts.h \
            || { echo "::error::tiny_fonts.h differs between the two firmware trees -- re-sync them."; exit 1; }
          echo "firmware/ and firmware_arduino/ are in sync."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies (same pins as the image)
        run: pip install -r app/requirements.txt -r collector/requirements.txt

      # Advisory-only dependency audit (0.9.5.2): surfaces known CVEs in
      # the pinned dependency set on every build. Deliberately
      # non-blocking -- a brand-new advisory shouldn't be able to wedge
      # an unrelated release -- but it shows up red in the step list, so
      # a vulnerable pin gets noticed and bumped deliberately.
      - name: Dependency audit (advisory, non-blocking)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt -r collector/requirements.txt

      - name: Firmware logic tests (compiled against stub headers)
        run: |
          g++ -std=c++17 -I tests/firmware_stubs -o /tmp/fw_test tests/test_firmware_logic.cpp
          /tmp/fw_test

      - name: Collector health tests
        run: python3 tests/test_collector_health.py

      - name: Updater tests (fake Docker daemon)
        run: python3 tests/test_updater.py

      - name: Serial endpoint tests (pty-pair fake device)
        run: python3 tests/test_serial_endpoints.py

      - name: Auth tests (optional PIN layer)
        run: python3 tests/test_auth.py

  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # Fail the whole build early if VERSION and CHANGELOG.json disagree
      # -- the classic "bumped one, forgot the other" release mistake.
      # With versioned image tags (see the push job) the VERSION string
      # now names a real Docker Hub artifact, so it has to be right.
      - name: Check VERSION matches newest CHANGELOG entry
        run: |
          python3 - << 'EOF'
          import json, sys
          v = open("VERSION").read().strip()
          top = json.load(open("CHANGELOG.json"))["entries"][0]["version"]
          if v != top:
              sys.exit(f"VERSION file says {v} but the newest CHANGELOG.json "
                       f"entry is {top} -- bump whichever one was forgotten.")
          print(f"VERSION {v} matches the newest CHANGELOG entry.")
          EOF

      - name: Set up Python (for PlatformIO)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (both bridge and native-USB variants)
        working-directory: firmware
        run: pio run

      - name: Stage firmware binaries for the Docker build
        run: |
          mkdir -p webflasher/firmware/bridge webflasher/firmware/native
          cp firmware/.pio/build/esp32-s3-tinyscreen-bridge/bootloader.bin webflasher/firmware/bridge/
          cp firmware/.pio/build/esp32-s3-tinyscreen-bridge/partitions.bin webflasher/firmware/bridge/
          cp firmware/.pio/build/esp32-s3-tinyscreen-bridge/firmware.bin webflasher/firmware/bridge/
          cp firmware/.pio/build/esp32-s3-tinyscreen-native/bootloader.bin webflasher/firmware/native/
          cp firmware/.pio/build/esp32-s3-tinyscreen-native/partitions.bin webflasher/firmware/native/
          cp firmware/.pio/build/esp32-s3-tinyscreen-native/firmware.bin webflasher/firmware/native/
          # Stamp the image with the version string currently in main.cpp,
          # so the running server can tell "what firmware version am I
          # bundling" and compare it against what a device actually
          # reports (see server.py's /api/firmware_info and the General
          # tab's "Check for Update"). This is NOT auto-generated from the
          # git commit -- it only changes when FIRMWARE_VERSION in
          # main.cpp is deliberately bumped, so unrelated Python/dashboard
          # changes don't make every deploy look like a firmware update.
          grep -oP '(?<=#define FIRMWARE_VERSION ")[^"]+' firmware/src/main.cpp > webflasher/firmware/version.txt
          cat webflasher/firmware/version.txt

      - name: Upload firmware artifact for the next job
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bins
          path: webflasher/firmware/

  build-and-push:
    needs: [build-firmware, checks]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-bins
          path: webflasher/firmware

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Stage the pinned esp-web-tools self-host bundle into the build
      # context, so wizard.html loads it from THIS app instead of unpkg
      # (works offline, version can't float, no CDN in the supply chain).
      # dist/web/ is the package's official "locally host the JavaScript"
      # bundle; the whole directory is copied because install-button.js
      # lazy-loads sibling chunks from it. Keep this version in lockstep
      # with the pinned CDN fallback in webflasher/wizard.html.
      - name: Vendor esp-web-tools into webflasher/
        run: |
          npm pack esp-web-tools@10.2.1
          tar -xzf esp-web-tools-10.2.1.tgz
          mkdir -p webflasher/vendor/esp-web-tools
          cp -r package/dist/web/. webflasher/vendor/esp-web-tools/
          rm -rf package esp-web-tools-10.2.1.tgz
          ls webflasher/vendor/esp-web-tools/

      - name: Stamp app version
        run: |
          # Unlike a Docker image digest (which can't be known until AFTER
          # the image is built -- baking your own digest into an image
          # changes the image, which changes the digest), the git commit
          # SHA is known before the build even starts, so no chicken-and-
          # egg problem here. This lets the running app compare "what
          # commit am I built from" against GitHub's own commit history
          # (a plain public API call, no Docker socket or Docker Hub API
          # needed) to detect when it's running something older than
          # what's on GitHub -- see server.py's /api/app_version.
          # The human-facing version string comes from the repo-root
          # VERSION file (MAJOR.MINOR.FEATURE.ITERATION scheme, bumped
          # every code round). Display only -- update DETECTION still
          # keys off the commit SHA below, which can't be forgotten the
          # way a manual bump can.
          APP_VERSION=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "unknown")
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          cat > webflasher/app_version.json << EOF
          {"version": "${APP_VERSION}", "commit": "${{ github.sha }}", "branch": "${{ github.ref_name }}", "repo": "${{ github.repository }}"}
          EOF
          cat webflasher/app_version.json

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/Dockerfile
          platforms: linux/amd64   # ZimaBoard/ZimaBlade are x86
          push: true
          # :latest is what installs and the self-updater track; the
          # version tag makes every release an addressable, pinnable
          # artifact -- so a CHANGELOG entry now names a real image you
          # can roll back to by editing the compose file, and "what
          # exactly is running" has a stable answer beyond a mutable
          # :latest. The CI check in the firmware job guarantees this
          # tag agrees with the newest CHANGELOG entry.
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tinyscreen-dashboard:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tinyscreen-dashboard:${{ env.APP_VERSION }}
