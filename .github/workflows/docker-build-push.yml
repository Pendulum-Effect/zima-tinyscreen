name: Build firmware and push Tiny Screen image

# Two things happen here, on GitHub's own runners:
#   1. Compile the ESP32-S3 firmware with PlatformIO and drop the binaries
#      into webflasher/firmware/ -- used by BOTH the browser WebSerial
#      flasher (index.html) and the server-side flasher baked into the
#      Docker image (server.py's /api/flash, for boards plugged directly
#      into the ZimaBlade instead of a computer).
#   2. Build app/Dockerfile (which bundles those binaries) and push it to
#      Docker Hub.
# Nothing needs to be installed on your own machine -- just push to main.

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}  # lets you trigger a build manually from the Actions tab

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python (for PlatformIO)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run

      - name: Stage firmware binaries for the Docker build
        run: |
          mkdir -p webflasher/firmware
          cp firmware/.pio/build/esp32-s3-tinyscreen/bootloader.bin webflasher/firmware/
          cp firmware/.pio/build/esp32-s3-tinyscreen/partitions.bin webflasher/firmware/
          cp firmware/.pio/build/esp32-s3-tinyscreen/firmware.bin webflasher/firmware/

      - name: Upload firmware artifact for the next job
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bins
          path: webflasher/firmware/

  build-and-push:
    needs: build-firmware
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-bins
          path: webflasher/firmware

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/Dockerfile
          platforms: linux/amd64   # ZimaBoard/ZimaBlade are x86
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tinyscreen-dashboard:latest

