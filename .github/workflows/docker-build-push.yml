name: Build and push Tiny Screen image

# Builds the app/Dockerfile on GitHub's own runners (which already have
# Docker installed) and pushes the result to Docker Hub. Nothing needs to
# be installed on your own machine -- just push to this repo's main branch.

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}  # lets you trigger a build manually from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/Dockerfile
          platforms: linux/amd64   # ZimaBoard/ZimaBlade are x86
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tinyscreen-dashboard:latest
