; Tiny Screen firmware — supports boards 0/1, see main.cpp's BOARD_PROFILES
;
; TWO build environments, both compiling the exact same src/main.cpp, that
; differ in exactly one respect: ARDUINO_USB_CDC_ON_BOOT. This is a
; build-time flag, not something runtime config can change, so a board
; needing the opposite setting needs an entirely separate compiled binary:
;   - bridge: boards with a USB-UART bridge chip (CH343P etc) -- board 0
;   - native: boards using the ESP32-S3's native USB peripheral -- board 1
;
; `pio run` (no -e flag) builds BOTH environments. CI copies both sets of
; binaries into webflasher/firmware/{bridge,native}/ -- see
; .github/workflows/docker-build-push.yml and webflasher/manifest-*.json.
;
; Build:  pio run
; Flash:  pio run -e esp32-s3-tinyscreen-bridge -t upload   (or -native)

[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Arduino_GFX is pinned to an EXACT version (not a floating ^1.4.7-style
; range) deliberately: versions 1.6.x introduced a reference to
; esp32-hal-periman.h in Arduino_ESP32SPI.h that doesn't resolve under
; PlatformIO's packaging (a known issue -- see
; github.com/moononournation/Arduino_GFX/issues/552 -- the library's own
; maintainer has said PlatformIO compatibility isn't something they
; actively support). 1.4.9 predates that commit entirely, so it sidesteps
; the problem rather than working around it.
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.9
    bblanchon/ArduinoJson @ ^7.0.4

[env:esp32-s3-tinyscreen-bridge]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_deps = ${common.lib_deps}
; Board 0: USB-UART bridge chip (CH343P), NOT native USB-CDC.
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0

[env:esp32-s3-tinyscreen-native]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
lib_deps = ${common.lib_deps}
; Board 1: native USB peripheral, no bridge chip -- opposite setting.
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
