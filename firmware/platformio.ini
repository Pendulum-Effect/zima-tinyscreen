; Tiny Screen firmware — supports boards 0/1/2, see main.cpp's BOARD_PROFILES
; Build:  pio run
; Flash:  pio run -t upload
; The build output used by the web flasher is:
;   .pio/build/esp32-s3-tinyscreen/firmware.bin        (application)
;   .pio/build/esp32-s3-tinyscreen/bootloader.bin
;   .pio/build/esp32-s3-tinyscreen/partitions.bin
; See webflasher/manifest.json for how these get combined for WebSerial flashing.

[env:esp32-s3-tinyscreen]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; This board only exposes a UART bridge (CH343P), not native USB-CDC,
; so we do NOT enable ARDUINO_USB_MODE / ARDUINO_USB_CDC_ON_BOOT.
; (Board 2 needs the opposite setting when flashed via Arduino IDE
; instead -- see the note at the top of main.cpp. This platformio.ini
; only targets board 0's USB setup; boards 1/2 firmware is identical,
; just needs a different Arduino IDE Tools-menu setting when building
; there instead of here.)
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0

monitor_speed = 115200
upload_speed = 921600

; Arduino_GFX is pinned to an EXACT version (not a floating ^1.4.7-style
; range) deliberately: versions 1.6.x introduced a reference to
; esp32-hal-periman.h in Arduino_ESP32SPI.h that doesn't resolve under
; PlatformIO's packaging (a known issue -- see
; github.com/moononournation/Arduino_GFX/issues/552 -- the library's own
; maintainer has said PlatformIO compatibility isn't something they
; actively support). 1.4.9 predates that commit entirely, so it sidesteps
; the problem rather than working around it.
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.9
    bblanchon/ArduinoJson @ ^7.0.4
