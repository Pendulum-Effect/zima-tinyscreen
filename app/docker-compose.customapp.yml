name: tinyscreen-dashboard

# This is the same app as ../app/docker-compose.yml, but pointed at a
# published Docker Hub image instead of a local build. Paste this into
# ZimaOS's App Store -> Install a Custom App -> Docker Compose form and
# ZimaOS will pull the image itself -- no SSH into the ZimaOS box needed.
#
# Before pasting: replace YOUR_DOCKERHUB_USERNAME below with your actual
# Docker Hub username (see README "Publish to Docker Hub instead of SSH").

services:
  tinyscreen-dashboard:
    image: YOUR_DOCKERHUB_USERNAME/tinyscreen-dashboard:latest
    pull_policy: always  # always re-pull, even for the same :latest tag
    container_name: tinyscreen-dashboard
    restart: unless-stopped
    # Standard bridge networking with explicit ports (not network_mode:
    # host). host networking was tried briefly to fix network stats being
    # stuck at 0, but isolation testing later showed the real connectivity
    # issue (a much worse problem -- the ESP32 not receiving data at all)
    # persisted even without it, so host networking wasn't actually the
    # cause and wasn't worth the added complexity. Network stats being
    # stuck at 0 remains a known, accepted limitation of bridge networking
    # (the container can only see its own virtual interface) until a
    # different fix is found (e.g. bind-mounting /proc/net/dev directly).
    ports:
      - target: 8989
        published: "8989"
        protocol: tcp
      - target: 8990
        published: "8990"
        protocol: tcp
    environment:
      - TINYSCREEN_STATUS_FILE=/tmp/tinyscreen_status.json
      # Set this if auto-detect picks the wrong serial device, e.g. /dev/ttyACM0
      - TINYSCREEN_SERIAL_PORT=

    # The ESP32-S3 shows up as a serial device node, e.g. /dev/ttyACM0
    # (Linux CDC-ACM driver, matching the CH343P/native-USB-CDC bridge
    # this board uses). Mounting all of /dev (rather than a single
    # --device mapping) is the reliable option here: it survives replugs
    # and doesn't depend on guessing the exact device node ahead of time.
    # `privileged: true` is required alongside this for the container to
    # actually be allowed to open the device.
    volumes:
      - type: bind
        source: /dev
        target: /dev
      # Persists the self-signed HTTPS cert across restarts, so you don't
      # get a fresh "untrusted certificate" browser warning every reboot.
      # Long-form bind syntax matches ZimaOS/CasaOS's own documented
      # convention for AppData volumes (vs. the short "host:container"
      # string form), for the best chance it shows up correctly in the
      # ZimaOS Files app too.
      - type: bind
        source: /DATA/AppData/tinyscreen-dashboard/certs
        target: /opt/tinyscreen/certs
    privileged: true

    x-casaos:
      architectures:
        - amd64
      main: tinyscreen-dashboard
      author: you
      category: Utilities
      description:
        en_us: "Streams live CPU/RAM/MMC/network/temperature stats from this ZimaOS device to a small ESP32-S3 round display, and hosts a one-click WebSerial flasher for the ESP32-S3 firmware."
      developer: you
      icon: https://raw.githubusercontent.com/your-repo/tinyscreen/main/icon.png
      screenshot_link: []
      tagline:
        en_us: "A tiny external dashboard for your ZimaBoard/ZimaBlade"
      title:
        en_us: "Tiny Screen Dashboard"
      port_map: "8989"
      index: /
