name: tinyscreen-dashboard

services:
  tinyscreen-dashboard:
    image: tinyscreen-dashboard:latest
    pull_policy: always  # always re-pull, even for the same :latest tag
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: tinyscreen-dashboard
    restart: unless-stopped
    # Standard bridge networking with explicit ports (not network_mode:
    # host). host networking was tried briefly to fix network stats being
    # stuck at 0, but isolation testing later showed the real connectivity
    # issue (a much worse problem -- the ESP32 not receiving data at all)
    # persisted even without it, so host networking wasn't actually the
    # cause and wasn't worth the added complexity. Network stats are now
    # fixed a different way -- see the /proc/1/net/dev bind mount below --
    # without needing to share the container's whole network stack.
    ports:
      - target: 8989
        published: "8989"
        protocol: tcp
      - target: 8990
        published: "8990"
        protocol: tcp
    environment:
      - TINYSCREEN_STATUS_FILE=/tmp/tinyscreen_status.json
      # Set this if auto-detect picks the wrong serial device, e.g. /dev/ttyACM0
      - TINYSCREEN_SERIAL_PORT=
      - TINYSCREEN_HOST_NET_DEV=/host_net_dev
      - TINYSCREEN_DATA_PATH=/host_data
      - TINYSCREEN_HOST_ROOT=/host_root

    # The ESP32-S3 shows up as a serial device node, e.g. /dev/ttyACM0
    # (Linux CDC-ACM driver, matching the CH343P/native-USB-CDC bridge
    # this board uses). Mounting all of /dev (rather than a single
    # --device mapping) is the reliable option here: it survives replugs
    # and doesn't depend on guessing the exact device node ahead of time.
    # `privileged: true` is required alongside this for the container to
    # actually be allowed to open the device.
    volumes:
      - type: bind
        source: /dev
        target: /dev
      # A single small pseudo-file, NOT the whole host filesystem or
      # network stack -- PID 1 always lives in the host's real network
      # namespace, so bind-mounting its /proc/1/net/dev view gives
      # accurate host-level network throughput without needing
      # network_mode: host (see NetworkMeter/parse_proc_net_dev in
      # stats_collector.py, which reads and parses this directly).
      - type: bind
        source: /proc/1/net/dev
        target: /host_net_dev
        read_only: true
      # A single, non-recursive top-level directory -- NOT the whole host
      # filesystem like the earlier, since-reverted NAS attempt used.
      # ZimaOS/CasaOS always has a /DATA mount (backed by the OS disk
      # itself when no extra drives are attached, expanded to cover a
      # real storage pool once one exists) -- see get_nas_pool() in
      # stats_collector.py, which compares this mount's total capacity
      # against the MMC disk's own to tell those two cases apart.
      - type: bind
        source: /DATA
        target: /host_data
        read_only: true
      # The host's real root filesystem -- needed because the CONTAINER's
      # own "/" is backed by Docker's storage driver, wherever that
      # physically lives, which is NOT necessarily the same disk as the
      # host's actual OS/eMMC. This was a real, discovered issue: moving
      # Docker's own data-root to a new drive (via ZimaOS's "migrate
      # AppData/AppImages" feature) immediately changed what the
      # container's own "/" reported, since it started reflecting the new
      # drive instead of the actual onboard MMC. get_mmc() in
      # stats_collector.py uses this mount instead of the container's own
      # "/" specifically to avoid depending on that coincidental (and
      # apparently not guaranteed) alignment.
      #
      # This is a single, non-recursive disk_usage() call on one path --
      # NOT the kind of directory enumeration (disk_partitions()) the
      # earlier, since-reverted NAS auto-detection attempt did, so the
      # "pulls in every other container's overlay" concern that motivated
      # removing that approach doesn't really apply here: disk_usage()
      # only ever reports stats for the exact filesystem the given path
      # resolves to, regardless of what else happens to be visible nested
      # underneath it.
      - type: bind
        source: /
        target: /host_root
        read_only: true
      # Persists the self-signed HTTPS cert across restarts, so you don't
      # get a fresh "untrusted certificate" browser warning every reboot.
      # Long-form bind syntax matches ZimaOS/CasaOS's own documented
      # convention for AppData volumes (vs. the short "host:container"
      # string form), for the best chance it shows up correctly in the
      # ZimaOS Files app too.
      - type: bind
        source: /DATA/AppData/tinyscreen-dashboard/certs
        target: /opt/tinyscreen/certs
    privileged: true

    x-casaos:
      architectures:
        - amd64
      main: tinyscreen-dashboard
      author: you
      category: Utilities
      description:
        en_us: "Streams live CPU/RAM/MMC/network/temperature stats from this ZimaOS device to a small ESP32-S3 round display, and hosts a one-click WebSerial flasher for the ESP32-S3 firmware."
      developer: you
      icon: https://raw.githubusercontent.com/your-repo/tinyscreen/main/icon.png
      screenshot_link: []
      tagline:
        en_us: "A tiny external dashboard for your ZimaBoard/ZimaBlade"
      title:
        en_us: "Tiny Screen Dashboard"
      port_map: "8989"
      index: /
